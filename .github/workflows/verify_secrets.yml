name: Verify Secrets

on:
  workflow_dispatch:

jobs:
  verify-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Print secrets (will be masked)
        run: |
          echo "DEV_CRT=${{ secrets.DEV_CRT }}"
          echo "PRIVATE_KEY=${{ secrets.PRIVATE_KEY }}"

      - name: Write secrets to files for validation
        run: |
          echo "${{ secrets.DEV_CRT }}" > /tmp/dev.crt
          echo "${{ secrets.PRIVATE_KEY }}" > /tmp/private_key.pem

      - name: Validate file content markers
        run: |
          echo "--- dev.crt ---"
          head -n 1 /tmp/dev.crt
          echo "--- private_key.pem ---"
          head -n 1 /tmp/private_key.pem
