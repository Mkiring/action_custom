name: Build Test (seeed-build)

on:
  workflow_dispatch:
    inputs:
      board:
        description: "Board name"
        required: true
        type: choice
        options:
          - recomputer-rk3576-devkit
          - recomputer-rk3588-devkit
        default: recomputer-rk3576-devkit
      distro:
        description: "Distro family"
        required: true
        type: choice
        options:
          - Debian
          - Ubuntu
        default: Debian
      release:
        description: "Release/distro"
        required: true
        type: choice
        options:
          - trixie
          - bookworm
          - bullseye
          - buster
          - sid
          - forky
          - resolute
          - plucky
          - oracular
          - noble
          - jammy
          - focal
          - questing
        default: bookworm
      desktop:
        description: "Desktop environment"
        required: true
        type: choice
        options:
          - gnome
          - xfce
          - kde-plasma
          - mate
          - cinnamon
        default: gnome
      tier:
        description: "Desktop tier"
        required: true
        type: choice
        options:
          - minimal
          - mid
          - full
        default: mid
      version:
        description: "Version"
        required: true
        type: string
        default: ""
      recovery:
        description: "Enable recovery OTA"
        required: true
        type: boolean
        default: false
      ab:
        description: "Enable A/B dual-partition OTA"
        required: true
        type: boolean
        default: false
      secure_boot:
        description: "Enable secure U-Boot + encryption + auto-decrypt"
        required: true
        type: boolean
        default: false
      optee:
        description: "Enable OP-TEE boot + encryption + auto-decrypt"
        required: true
        type: boolean
        default: false

jobs:
  print-selections:
    runs-on: ubuntu-latest
    steps:
      - name: Validate and print selected build options
        run: |
          BOARD="${{ github.event.inputs.board }}"
          DISTRO="${{ github.event.inputs.distro }}"
          RELEASE="${{ github.event.inputs.release }}"
          DESKTOP="${{ github.event.inputs.desktop }}"
          TIER="${{ github.event.inputs.tier }}"
          VERSION="${{ github.event.inputs.version }}"
          RECOVERY="${{ github.event.inputs.recovery }}"
          AB="${{ github.event.inputs.ab }}"
          SECURE_BOOT="${{ github.event.inputs.secure_boot }}"
          OPTEE="${{ github.event.inputs.optee }}"

          PROFILES=""
          [ "$RECOVERY" = "true" ] && PROFILES="$PROFILES recovery"
          [ "$AB" = "true" ] && PROFILES="$PROFILES ab"
          [ "$SECURE_BOOT" = "true" ] && PROFILES="$PROFILES secure-boot"
          [ "$OPTEE" = "true" ] && PROFILES="$PROFILES optee"
          PROFILES=$(echo "$PROFILES" | sed 's/^[[:space:]]*//')

          DEBIAN_RELEASES="trixie bookworm bullseye buster sid forky resolute"
          UBUNTU_RELEASES="plucky oracular noble jammy focal questing"

          if [ "$DISTRO" = "Debian" ]; then
            if [[ " $DEBIAN_RELEASES " != *" $RELEASE "* ]]; then
              echo "Error: $RELEASE is not a Debian release."
              exit 1
            fi
          elif [ "$DISTRO" = "Ubuntu" ]; then
            if [[ " $UBUNTU_RELEASES " != *" $RELEASE "* ]]; then
              echo "Error: $RELEASE is not an Ubuntu release."
              exit 1
            fi
          fi

          echo "=== Selected build options ==="
          echo "board:    $BOARD"
          echo "distro:   $DISTRO"
          echo "release:  $RELEASE"
          echo "desktop:  $DESKTOP"
          echo "tier:     $TIER"
          echo "version:  $VERSION"
          echo "profiles: ${PROFILES:-<none>}"
          echo "================================"
          echo "Exiting as requested."
          exit 0
